<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>VLA 测试 - Honor Magic 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light p-4">
<div class="container">
    <h2 class="text-center mb-4">VLN Test</h2>

    {% if error %}
    <div class="alert alert-warning">{{ error }}</div>
    {% endif %}
    
    <form method="post">
        <div class="mb-3">
            <label class="form-label">指令（可中文）</label>
            <input type="text" name="prompt" class="form-control" value="{{ last_prompt }}" placeholder="例如：去桌子那里停下">
        </div>
        <button type="submit" class="btn btn-success btn-lg me-2">采集图像 + 推理</button>
        <button type="button" onclick="document.getElementById('use_last').value='true';document.querySelector('form').submit();" class="btn btn-primary btn-lg">用上次指令重新采集</button>
        <input type="hidden" name="use_last" id="use_last" value="false">
    </form>

    {% if image_b64 %}
    <div class="mt-4">
        <div class="row g-3 align-items-start">
            <div class="col-12 col-lg-6 text-center">
                <h4>当前图像</h4>
                <img src="data:image/jpeg;base64,{{ image_b64 }}" class="img-fluid rounded" style="max-height:500px;">
            </div>
            {% if waypoint_image_b64 %}
            <div class="col-12 col-lg-6 text-center">
                <h4>路径点可视化（红点）</h4>
                <img src="data:image/jpeg;base64,{{ waypoint_image_b64 }}" class="img-fluid rounded" style="max-height:500px;">
            </div>
            {% endif %}
        </div>
    </div>
    {% endif %}

    {% if result %}
    <div class="mt-4 alert alert-info">
        <h4>模型输出：</h4>
        <pre class="bg-dark p-3 text-light mb-0" style="white-space: pre-wrap;">{{ result }}</pre>
    </div>
    {% endif %}
</div>
</body>
</html>
